name: yuva
description: "A stable Firebase setup"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core Firebase (proven stable versions)
  firebase_core: ^3.8.0
  firebase_database: ^11.0.2
  firebase_storage: ^12.4.5
  firebase_data_connect: ^0.1.3
  firebase_auth: ^5.0.1  # Updated to latest stable version
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  cloud_firestore: ^5.6.6
  image_picker: ^1.0.4
  intl: ^0.19.0  # Updated to match firebase_data_connect requirement
  autocomplete_textfield: ^2.0.1
  numberpicker: ^2.1.2
  geocoding: ^3.0.0
  # For college name suggestions

  # Updated to resolve conflict with google_fonts
  http: ^1.3.0

  # Additional dependencies for location
  location: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/welcome_image.png # Make sure this path is exact